name: Backend Continuous Deployment

on:
  workflow_dispatch:

  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install pipenv
        run: pip install pipenv

      - name: Install dependencies
        run: |
          cd starter/backend
          pipenv install --dev

      - name: Run lint
        run: |
          cd starter/backend
          pipenv run lint

      - name: Run test
        run: |
          cd starter/backend
          pipenv run test

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and Tag Docker Image
        run: |
          cd starter/backend
          docker build -t ${{ steps.login-ecr.outputs.registry }}/backend:${{ github.sha }} .

      - name: Push to ECR
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/backend:${{ github.sha }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name cluster --region us-east-1

      - name: Deploy K8s
        run: |
          cd starter/backend/k8s
          kustomize edit set image backend=${{ steps.login-ecr.outputs.registry }}/backend:${{ github.sha }}
          kustomize build | kubectl apply -f -